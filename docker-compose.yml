version: '3.8'
services:
  db:
    image: postgres:15
    container_name: filesorter_db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: admin
      POSTGRES_DB: filesorter_db
    ports:
      - "5432:5432"

  redis:
    image: redis:7
    container_name: filesorter_redis
    ports:
      - "6379:6379"
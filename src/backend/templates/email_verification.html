<html>
    <body style="font-family: Arial, sans-serif; background-color: #f4f7f6; color: #333; padding: 20px;">
        <div style="max-width: 600px; margin: 0 auto; background: white; border-radius: 8px; overflow: hidden; box-shadow: 0 4px 6px rgba(0,0,0,0.1);">
            <div style="background-color: #6366F1; color: white; padding: 20px; text-align: center;">
                <h2 style="margin: 0; font-size: 24px;">File Governance System</h2>
                <p style="margin: 5px 0 0 0; font-size: 16px;">{{ title }}</p>
            </div>
            <div style="padding: 30px; text-align: center;">
                <p style="font-size: 16px; color: #555; line-height: 1.5;">{{ message_body }}</p>
                <div style="margin: 30px auto; padding: 15px; width: fit-content; background-color: #f8f9fa; border-radius: 8px; border: 2px dashed #6366F1;">
                    <span style="font-size: 36px; font-weight: bold; letter-spacing: 8px; color: #111827;">{{ code }}</span>
                </div>
                <p style="font-size: 13px; color: #888;">This code will expire soon.</p>
            </div>
            <div style="background-color: #f8f9fa; padding: 15px; text-align: center; font-size: 12px; color: #777;">
                &copy; 2026 File Governance System Enterprise
            </div>
        </div>
    </body>
</html>

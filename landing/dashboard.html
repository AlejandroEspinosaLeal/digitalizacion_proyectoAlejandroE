<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard | File Sorter Enterprise</title>
  <meta name="description" content="Dashboard for automated digital organization system.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          fontFamily: { sans: ['Inter', 'sans-serif'] },
        }
      }
    }
  </script>

  <script>
    if (localStorage.theme === 'dark' || (!('theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
      document.documentElement.classList.add('dark')
    } else {
      document.documentElement.classList.remove('dark')
    }
    function toggleTheme() {
      if (document.documentElement.classList.contains('dark')) {
        document.documentElement.classList.remove('dark');
        localStorage.theme = 'light';
      } else {
        document.documentElement.classList.add('dark');
        localStorage.theme = 'dark';
      }
      
      // Update chart theme if it exists
      if (window.extensionChartInstance && window.Chart) {
        const isDark = document.documentElement.classList.contains('dark');
        Chart.defaults.color = isDark ? '#a1a1aa' : '#52525b';
        if (window.extensionChartInstance.options.plugins.title) {
          window.extensionChartInstance.options.plugins.title.color = isDark ? '#f4f4f5' : '#18181b';
        }
        if (window.extensionChartInstance.options.plugins.legend.labels) {
          window.extensionChartInstance.options.plugins.legend.labels.color = isDark ? '#a1a1aa' : '#52525b';
        }
        window.extensionChartInstance.data.datasets[0].borderColor = Array(8).fill(isDark ? '#18181b' : '#ffffff');
        window.extensionChartInstance.update();
      }
    }
  </script>
</head>
<body class="bg-zinc-50 dark:bg-zinc-950 text-zinc-900 dark:text-zinc-50 font-sans antialiased selection:bg-zinc-200 dark:selection:bg-zinc-700 transition-colors duration-300">

  <!-- NAVIGATION -->
  <nav class="fixed top-0 w-full h-16 bg-white/80 dark:bg-zinc-950/80 backdrop-blur-md border-b border-zinc-200/80 dark:border-zinc-800/80 z-50 flex items-center justify-between px-6 lg:px-12 transition-colors duration-300">
    <a href="index.html" class="flex items-center gap-2 text-xl font-bold tracking-tight text-zinc-900 dark:text-white">
      <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="text-zinc-900 dark:text-white"><path d="M20 20a2 2 0 0 0 2-2V8a2 2 0 0 0-2-2h-7.9a2 2 0 0 1-1.69-.9L9.6 3.9A2 2 0 0 0 7.93 3H4a2 2 0 0 0-2 2v13a2 2 0 0 0 2 2Z"/></svg>
      FileSorter
    </a>
    
    <div class="flex items-center gap-4">
      <!-- Dark mode toggle -->
      <button onclick="toggleTheme()" class="p-2 text-zinc-500 hover:text-zinc-900 dark:text-zinc-400 dark:hover:text-white transition-colors rounded-full hover:bg-zinc-100 dark:hover:bg-zinc-800">
        <svg class="block dark:hidden" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3a6 6 0 0 0 9 9 9 9 0 1 1-9-9Z"/></svg>
        <svg class="hidden dark:block" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="4"/><path d="M12 2v2"/><path d="M12 20v2"/><path d="m4.93 4.93 1.41 1.41"/><path d="m17.66 17.66 1.41 1.41"/><path d="M2 12h2"/><path d="M20 12h2"/><path d="m6.34 17.66-1.41 1.41"/><path d="m19.07 4.93-1.41 1.41"/></svg>
      </button>

      <!-- Language Button -->
      <button id="lang-btn" class="flex items-center px-3 py-1.5 text-xs font-semibold text-zinc-600 dark:text-zinc-300 bg-zinc-100 dark:bg-zinc-800 hover:bg-zinc-200 dark:hover:bg-zinc-700 border border-zinc-200 dark:border-zinc-700 rounded-full transition-all">
        EN
      </button>

      <button id="logout-btn" class="px-4 py-2 text-sm font-semibold text-zinc-900 dark:text-white bg-white dark:bg-zinc-800 border border-zinc-200 dark:border-zinc-700 rounded-lg hover:bg-zinc-50 dark:hover:bg-zinc-700 hover:border-zinc-300 dark:hover:border-zinc-600 transition-all shadow-sm" data-i18n="nav.logout">Log Out</button>
    </div>
  </nav>

  <!-- MAIN DASHBOARD CONTENT -->
  <main class="pt-28 pb-20 px-6 lg:px-12 max-w-7xl mx-auto">
    <div class="mb-10 text-center md:text-left">
      <h1 class="text-3xl font-extrabold tracking-tight text-zinc-900 dark:text-white mb-2" data-i18n="dash.title">Activity Dashboard</h1>
      <p class="text-zinc-500 dark:text-zinc-400" data-i18n="dash.subtitle">Live tracking of your organized files.</p>
    </div>

    <!-- KPIs -->
    <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-12">
      <!-- KPI 1 -->
      <div class="bg-white dark:bg-zinc-900 border border-zinc-200 dark:border-zinc-800 rounded-2xl p-6 shadow-sm flex items-center gap-5 transition-colors duration-300">
        <div class="w-12 h-12 rounded-xl bg-blue-50 dark:bg-blue-900/30 flex items-center justify-center text-blue-600 dark:text-blue-400">
          <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14.5 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7.5L14.5 2z"/><polyline points="14 2 14 8 20 8"/></svg>
        </div>
        <div>
          <h3 class="text-xs font-semibold text-zinc-500 dark:text-zinc-400 uppercase tracking-wider mb-1" data-i18n="dash.kpi.total">Total Sorted</h3>
          <p class="text-3xl font-bold text-zinc-900 dark:text-white" id="kpi-files">0</p>
        </div>
      </div>

      <!-- KPI 2 -->
      <div class="bg-white dark:bg-zinc-900 border border-zinc-200 dark:border-zinc-800 rounded-2xl p-6 shadow-sm flex items-center gap-5 transition-colors duration-300">
        <div class="w-12 h-12 rounded-xl bg-emerald-50 dark:bg-emerald-900/30 flex items-center justify-center text-emerald-600 dark:text-emerald-400">
          <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 20a2 2 0 0 0 2-2V8a2 2 0 0 0-2-2h-7.9a2 2 0 0 1-1.69-.9L9.6 3.9A2 2 0 0 0 7.93 3H4a2 2 0 0 0-2 2v13a2 2 0 0 0 2 2Z"/></svg>
        </div>
        <div>
          <h3 class="text-xs font-semibold text-zinc-500 dark:text-zinc-400 uppercase tracking-wider mb-1" data-i18n="dash.kpi.cats">Categories</h3>
          <p class="text-3xl font-bold text-zinc-900 dark:text-white" id="kpi-cats">0</p>
        </div>
      </div>

      <!-- KPI 3 -->
      <div class="bg-white dark:bg-zinc-900 border border-zinc-200 dark:border-zinc-800 rounded-2xl p-6 shadow-sm flex items-center gap-5 transition-colors duration-300">
        <div class="w-12 h-12 rounded-xl bg-purple-50 dark:bg-purple-900/30 flex items-center justify-center text-purple-600 dark:text-purple-400">
          <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="16" height="20" x="4" y="2" rx="2" ry="2"/><line x1="12" x2="12.01" y1="18" y2="18"/></svg>
        </div>
        <div>
          <h3 class="text-xs font-semibold text-zinc-500 dark:text-zinc-400 uppercase tracking-wider mb-1" data-i18n="dash.kpi.devices">Active Devices</h3>
          <p class="text-3xl font-bold text-zinc-900 dark:text-white" id="kpi-devices">0</p>
        </div>
      </div>
    </div>

    <div class="grid lg:grid-cols-3 gap-8">
      
      <!-- ACTIVITY TABLE -->
      <div class="lg:col-span-2">
        <div class="bg-white dark:bg-zinc-900 border border-zinc-200 dark:border-zinc-800 rounded-2xl shadow-sm overflow-hidden transition-colors duration-300">
          <div class="overflow-x-auto">
            <table class="w-full text-left text-sm">
              <thead class="bg-zinc-50 dark:bg-zinc-800/50 text-zinc-500 dark:text-zinc-400 border-b border-zinc-200 dark:border-zinc-800">
                <tr>
                  <th class="px-6 py-4 font-semibold" data-i18n="dash.table.file">File Name</th>
                  <th class="px-6 py-4 font-semibold" data-i18n="dash.table.category">Category</th>
                  <th class="px-6 py-4 font-semibold" data-i18n="dash.table.path">Destination Path</th>
                  <th class="px-6 py-4 font-semibold text-right" data-i18n="dash.table.time">Timestamp (UTC)</th>
                </tr>
              </thead>
              <tbody id="activity-tbody" class="divide-y divide-zinc-100 dark:divide-zinc-800">
                <tr>
                  <td colspan="4" class="px-6 py-8 text-center text-zinc-500 dark:text-zinc-400" data-i18n="dash.table.loading">Loading records...</td>
                </tr>
              </tbody>
            </table>
          </div>
        </div>
      </div>

      <!-- PIE CHART -->
      <div class="lg:col-span-1 flex flex-col">
        <div class="bg-white dark:bg-zinc-900 border border-zinc-200 dark:border-zinc-800 rounded-2xl shadow-sm p-6 sm:p-8 flex flex-col flex-1 items-center justify-center transition-colors duration-300">
          <div class="text-center mb-6 w-full">
            <h2 class="text-lg font-bold text-zinc-900 dark:text-white mb-1" data-i18n="dash.chart.title">Distribution by Extension</h2>
            <p class="text-xs text-zinc-500 dark:text-zinc-400" data-i18n="dash.chart.subtitle">Visual breakdown of your sorted files</p>
          </div>
          
          <div class="relative w-full max-w-[260px] aspect-square flex items-center justify-center">
            <canvas id="extensionChart"></canvas>
          </div>
        </div>
      </div>
      
    </div>
  </main>

  <!-- Supabase CDN JS -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <!-- Chart.js CDN -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="i18n.js"></script>
  <script src="dashboard.js"></script>
</body>
</html>
